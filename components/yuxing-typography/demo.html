<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @font-face{font-family:"Noto Sans SC";src:url("../../assets/fonts/noto/NotoSansSC-Regular.ttf") format("truetype");font-weight:400;font-display:swap}
    @font-face{font-family:"Noto Sans SC";src:url("../../assets/fonts/noto/NotoSansSC-Medium.ttf") format("truetype");font-weight:500;font-display:swap}
    @font-face{font-family:"Noto Serif SC";src:url("../../assets/fonts/noto/NotoSerifSC-Semibold.ttf") format("truetype");font-weight:600;font-display:swap}
    @font-face{font-family:"Noto Serif SC";src:url("../../assets/fonts/noto/NotoSerifSC-Bold.ttf") format("truetype");font-weight:700;font-display:swap}
    @font-face{font-family:"Noto Serif SC";src:url("../../assets/fonts/noto/NotoSerifSC-Black.ttf") format("truetype");font-weight:900;font-display:swap}
    :root{--black:#000;--panel:#0a0a0f;--white:#fff;--muted:#6e6e73;--line:rgba(255,255,255,.1);--blue:#2997ff}
    *{box-sizing:border-box}
    html,body{min-width:320px;min-height:100%;margin:0;background:var(--black);color:var(--white);font-family:"Noto Sans SC",-apple-system,sans-serif}
    button,input{font:inherit}
    .toolbar{min-height:54px;padding:8px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;background:rgba(10,10,15,.96)}
    .font-name{margin-right:auto;font-family:"Noto Serif SC",serif;font-size:12px;font-weight:600;letter-spacing:0}
    .modes{height:34px;padding:3px;border-radius:7px;background:#18181e;display:flex;gap:2px}
    .mode{height:28px;padding:0 10px;border:0;border-radius:5px;background:transparent;color:#85858b;font-size:10px;cursor:pointer}
    .mode.active{background:#303038;color:#fff}
    .size-control{display:flex;align-items:center;gap:8px;color:#a1a1a6;font-size:10px}
    .size-control input{width:92px;accent-color:var(--blue)}
    .size-control output{width:34px;color:#d2d2d7;font-variant-numeric:tabular-nums}
    .specimen{min-height:calc(100vh - 54px);display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr)}
    .sample{min-width:0;padding:clamp(30px,5vw,72px);display:flex;flex-direction:column;justify-content:center;transition:background .2s,opacity .2s}
    .sample:not(.active){opacity:.62}
    .sample.active{background:radial-gradient(circle at 20% 50%,rgba(41,151,255,.1),transparent 52%)}
    .section-sample{border-left:1px solid var(--line);background:var(--panel)}
    .meta{margin:0 0 20px;color:var(--blue);font-size:10px;font-weight:500;letter-spacing:4px}
    .hero-title,.section-title{margin:0;font-family:"Noto Serif SC",serif;color:var(--white);outline:none}
    .hero-title{font-size:clamp(44px,6vw,74px);font-weight:700;line-height:1.06;letter-spacing:-1px}
    .section-title{font-size:clamp(34px,4.5vw,56px);font-weight:700;line-height:1.08;letter-spacing:-.5px}
    [contenteditable]:focus{box-shadow:0 2px 0 var(--blue)}
    @media(max-width:720px){.toolbar{align-items:flex-start;flex-wrap:wrap}.font-name{width:100%;margin:0}.size-control{margin-left:auto}.specimen{grid-template-columns:1fr}.sample{min-height:calc((100vh - 96px)/2);padding:32px 24px}.section-sample{border-top:1px solid var(--line);border-left:0}.meta{margin-bottom:14px}}
    @media(prefers-reduced-motion:reduce){.sample{transition:none}}
  </style>
</head>
<body>
  <header class="toolbar">
    <strong class="font-name">Noto Serif SC · 御行标题</strong>
    <div class="modes" role="group" aria-label="标题层级">
      <button class="mode active" data-target="hero" type="button" aria-pressed="true">主视觉</button>
      <button class="mode" data-target="section" type="button" aria-pressed="false">章节</button>
    </div>
    <label class="size-control">字号<input id="size" type="range" min="34" max="90" value="74"><output id="sizeValue">74px</output></label>
  </header>
  <main class="specimen">
    <section class="sample hero-sample active" data-sample="hero">
      <p class="meta">HERO / DISPLAY 700</p>
      <h1 class="hero-title" contenteditable="true" spellcheck="false">御行枢控，<br>无人机具身<br>智能体。</h1>
    </section>
    <section class="sample section-sample" data-sample="section">
      <p class="meta">SECTION / HEADING 700</p>
      <h2 class="section-title" contenteditable="true" spellcheck="false">云端大脑，<br>边缘执行。</h2>
    </section>
  </main>
  <script>
    const modes=[...document.querySelectorAll('[data-target]')];
    const samples=[...document.querySelectorAll('[data-sample]')];
    const size=document.querySelector('#size');
    const sizeValue=document.querySelector('#sizeValue');
    let active='hero';

    function selectSample(name){
      active=name;
      modes.forEach(button=>{const selected=button.dataset.target===name;button.classList.toggle('active',selected);button.setAttribute('aria-pressed',String(selected))});
      samples.forEach(sample=>sample.classList.toggle('active',sample.dataset.sample===name));
      const title=document.querySelector(`[data-sample="${name}"] :is(h1,h2)`);
      const computedSize=Math.round(parseFloat(getComputedStyle(title).fontSize));
      size.value=String(computedSize);
      sizeValue.value=`${computedSize}px`;
    }

    modes.forEach(button=>button.addEventListener('click',()=>selectSample(button.dataset.target)));
    size.addEventListener('input',()=>{const title=document.querySelector(`[data-sample="${active}"] :is(h1,h2)`);title.style.fontSize=`${size.value}px`;sizeValue.value=`${size.value}px`});
  </script>
</body>
</html>
