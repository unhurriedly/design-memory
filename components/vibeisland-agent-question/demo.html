<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root{--cyan:#06b6d4;--ink:#050505;--spring:cubic-bezier(.175,.885,.32,1.1)}
    *{box-sizing:border-box}
    html,body{min-width:320px;min-height:100%;margin:0;background:#dfe6eb;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}
    button{font:inherit}
    .demo{min-height:100vh;padding:18px;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#f8fbfc 0,#dfe6eb 68%)}
    .desktop{position:relative;width:min(880px,calc(100vw - 36px));aspect-ratio:16/9;min-height:350px;overflow:hidden;border:1px solid rgba(20,35,45,.13);border-radius:16px;background:linear-gradient(145deg,#eef4f7,#cbd8df);box-shadow:0 24px 70px rgba(27,43,52,.18)}
    .menubar{height:28px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,249,251,.72);color:#20303a;font-size:10px;backdrop-filter:blur(16px)}
    .brand{font-weight:700}.clock{font-variant-numeric:tabular-nums}
    .wallpaper{position:absolute;inset:28px 0 0;display:grid;place-items:center;color:rgba(25,50,63,.4)}
    .wallpaper-copy{text-align:center}.wallpaper-copy strong{display:block;color:rgba(25,50,63,.63);font-size:clamp(20px,4vw,40px)}.wallpaper-copy span{font-size:12px}
    .island-wrap{position:absolute;z-index:3;top:0;left:50%;transform:translateX(-50%);display:flex;justify-content:center}
    .island{position:relative;width:260px;height:40px;overflow:visible;border-radius:0 0 10px 10px;background:#000;color:#e5e5e5;box-shadow:0 2px 8px rgba(0,0,0,.6),0 8px 24px rgba(0,0,0,.3);transition:width .5s var(--spring),height .5s var(--spring),border-radius .4s ease-out}
    .island::before,.island::after{content:"";position:absolute;top:0;width:13px;height:25px;pointer-events:none}
    .island::before{left:-13px;border-radius:0 6px 0 0;box-shadow:5px 0 0 #000}
    .island::after{right:-13px;border-radius:6px 0 0 0;box-shadow:-5px 0 0 #000}
    .island[data-state="ask"]{width:340px;height:160px;border-radius:0 0 14px 14px}
    .layer{position:absolute;inset:0;overflow:hidden;border-radius:inherit;display:flex;opacity:0;transform:scale(.96);filter:blur(2px);transition:opacity .25s,filter .3s,transform .35s var(--spring);pointer-events:none}
    .layer.is-active{opacity:1;transform:scale(1);filter:blur(0);transition-delay:.06s;pointer-events:auto}
    .compact{padding:0 14px;align-items:center;justify-content:space-between;font-size:11px}
    .agent{display:flex;align-items:center;gap:7px}.agent-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px rgba(6,182,212,.8)}.status{color:rgba(255,255,255,.55)}
    .ask{padding:12px 14px;flex-direction:column;gap:6px;border-radius:0 0 14px 14px}
    .ask-head{display:flex;align-items:center;gap:5px;color:var(--cyan);font-size:10px;font-weight:600;line-height:16px}
    .ask-head svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}
    .ask-question{color:rgba(255,255,255,.9);font-size:11px;font-weight:500;line-height:17.6px}
    .ask-options{display:flex;flex-direction:column;gap:3px}
    .ask-option{width:100%;height:28px;padding:5px 10px;border:0;border-radius:6px;display:flex;align-items:center;gap:8px;background:rgba(6,182,212,.15);color:rgba(255,255,255,.9);font-size:10px;text-align:left;cursor:pointer;transition:background .15s,transform .15s}
    .ask-option:hover,.ask-option:focus-visible{outline:none;background:rgba(6,182,212,.3);transform:translateX(2px)}
    .ask-option.is-selected{background:rgba(6,182,212,.42)}
    .shortcut{width:18px;height:18px;border-radius:4px;display:grid;place-items:center;flex:0 0 18px;background:rgba(6,182,212,.6);color:#fff;font:700 9px/1 ui-monospace,"SFMono-Regular",monospace;opacity:.72}
    .controls{position:absolute;z-index:2;left:50%;bottom:22px;transform:translateX(-50%);padding:4px;display:flex;gap:3px;border:1px solid rgba(20,35,45,.12);border-radius:8px;background:rgba(248,251,252,.78);box-shadow:0 8px 22px rgba(40,61,72,.12);backdrop-filter:blur(12px)}
    .controls button{height:28px;padding:0 12px;border:0;border-radius:5px;background:transparent;color:#51636d;font-size:11px;cursor:pointer}
    .controls button[aria-pressed="true"]{background:#fff;color:#10232e;box-shadow:0 1px 5px rgba(30,49,59,.14)}
    .feedback{position:absolute;left:50%;bottom:68px;transform:translate(-50%,8px);margin:0;color:#2c4a58;font-size:11px;opacity:0;transition:.2s}.feedback.is-visible{opacity:1;transform:translate(-50%,0)}
    @media(max-width:520px){.demo{padding:8px}.desktop{width:calc(100vw - 16px);min-height:420px;aspect-ratio:auto}.island[data-state="ask"]{width:min(340px,calc(100vw - 34px))}.ask-option{height:28px}.controls{bottom:16px}}
    @media(prefers-reduced-motion:reduce){.island,.layer,.ask-option,.feedback{transition-duration:.01ms}}
  </style>
</head>
<body>
  <main class="demo">
    <section class="desktop" aria-label="AI Agent 灵动岛询问面板演示">
      <header class="menubar"><span class="brand">Vibe Island</span><span class="clock">Thu 20:27</span></header>
      <div class="wallpaper"><div class="wallpaper-copy"><strong>Stay in flow.</strong><span>Agent decisions appear at the top of your workspace.</span></div></div>
      <div class="island-wrap">
        <div class="island" data-state="ask" id="island">
          <div class="layer compact" data-layer="compact"><span class="agent"><i class="agent-dot"></i>Claude</span><span class="status">Working</span></div>
          <div class="layer ask is-active" data-layer="ask">
            <div class="ask-head"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.1 9a3 3 0 1 1 5.2 2c-1.2 1.1-2.3 1.6-2.3 3.5M12 18h.01"/></svg><span>Claude asks</span></div>
            <div class="ask-question">Which deployment target?</div>
            <div class="ask-options">
              <button class="ask-option" data-value="Production"><span class="shortcut">⌘1</span><span>Production</span></button>
              <button class="ask-option" data-value="Staging"><span class="shortcut">⌘2</span><span>Staging</span></button>
              <button class="ask-option" data-value="Local only"><span class="shortcut">⌘3</span><span>Local only</span></button>
            </div>
          </div>
        </div>
      </div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <nav class="controls" aria-label="组件状态">
        <button type="button" data-state="compact" aria-pressed="false">紧凑</button>
        <button type="button" data-state="ask" aria-pressed="true">询问</button>
      </nav>
    </section>
  </main>
  <script>
    const island=document.querySelector('#island');
    const layers=[...document.querySelectorAll('[data-layer]')];
    const stateButtons=[...document.querySelectorAll('.controls button[data-state]')];
    const options=[...document.querySelectorAll('.ask-option')];
    const feedback=document.querySelector('#feedback');
    let resetTimer;
    function setState(state){island.dataset.state=state;layers.forEach(layer=>layer.classList.toggle('is-active',layer.dataset.layer===state));stateButtons.forEach(button=>button.setAttribute('aria-pressed',String(button.dataset.state===state)))}
    function choose(option){clearTimeout(resetTimer);options.forEach(item=>item.classList.toggle('is-selected',item===option));feedback.textContent='Selected: '+option.dataset.value;feedback.classList.add('is-visible');resetTimer=setTimeout(()=>{options.forEach(item=>item.classList.remove('is-selected'));feedback.classList.remove('is-visible')},1400)}
    stateButtons.forEach(button=>button.addEventListener('click',()=>setState(button.dataset.state)));
    options.forEach(option=>option.addEventListener('click',()=>choose(option)));
    window.addEventListener('keydown',event=>{if(island.dataset.state!=='ask')return;const index=Number(event.key)-1;if(index>=0&&index<options.length)choose(options[index])});
  </script>
</body>
</html>
