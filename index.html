<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="把喜欢的设计转化为 AI 和前端开发可复用的长期记忆。">
  <title>设记 Design Memory · 设计资源库</title>
  <link rel="icon" type="image/png" href="./assets/brand/sheji-design-memory-symbol.png">
  <link rel="stylesheet" href="./styles.css?v=misans-outfit-v1">
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" class="icon-sprite">
    <symbol id="i-grid" viewBox="0 0 24 24"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></symbol>
    <symbol id="i-type" viewBox="0 0 24 24"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></symbol>
    <symbol id="i-box" viewBox="0 0 24 24"><path d="m21 8-9-5-9 5 9 5 9-5Z"/><path d="m3 8 9 5 9-5M3 12l9 5 9-5M3 16l9 5 9-5"/></symbol>
    <symbol id="i-layout" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18M9 21V9"/></symbol>
    <symbol id="i-mouse" viewBox="0 0 24 24"><path d="m5 3 14 9-6 1-3 6-5-16Z"/></symbol>
    <symbol id="i-image" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8-6.2-3.2L5.8 21 7 14.2 2 9.3l6.9-1L12 2Z"/></symbol>
    <symbol id="i-external" viewBox="0 0 24 24"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
    <symbol id="i-copy" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"/></symbol>
    <symbol id="i-code" viewBox="0 0 24 24"><path d="m8 9-3 3 3 3M16 9l3 3-3 3M14 5l-4 14"/></symbol>
    <symbol id="i-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></symbol>
    <symbol id="i-edit" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></symbol>
  </svg>

  <div class="app-shell">
    <div class="mobile-brandbar">
      <img src="./assets/brand/sheji-design-memory-lockup.png" alt="设记 Design Memory">
    </div>
    <aside class="sidebar">
      <a class="brand" href="#" aria-label="设记 Design Memory 首页">
        <span class="brand-mark" aria-hidden="true">
          <img src="./assets/brand/sheji-design-memory-symbol.png" alt="">
        </span>
        <span class="brand-name"><strong>设记</strong><small>DESIGN MEMORY</small></span>
      </a>

      <p class="nav-label">资产类型</p>
      <nav id="typeNav" class="side-nav" aria-label="资产类型"></nav>

      <p class="nav-label source-label">最近浏览来源</p>
      <nav id="sourceNav" class="side-nav source-nav" aria-label="最近浏览来源"></nav>

      <div class="sidebar-foot">
        <p>把喜欢的设计转化为 AI 和前端开发可复用的长期记忆。</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <label class="search-field">
          <svg class="icon"><use href="#i-search"/></svg>
          <input id="searchInput" type="search" placeholder="搜索组件、字体、设计说明或来源" aria-label="搜索资源">
          <kbd>⌘ K</kbd>
        </label>
        <p class="topbar-tagline">把喜欢的设计转化为 AI 和前端开发可复用的长期记忆。</p>
      </header>

      <div class="workspace">
        <section class="page-heading">
          <div>
            <p class="eyebrow">DESIGN MEMORY LIBRARY</p>
            <h1 id="pageTitle">记忆资源库</h1>
            <p id="pageDescription">从参考网站中提取真实参数，复现为可以直接调用的前端组件。</p>
          </div>
          <div class="summary" id="summary"></div>
        </section>

        <section class="toolbar" aria-label="资源筛选">
          <div class="filter-chips" id="filterChips"></div>
          <select id="sortSelect" aria-label="排序方式">
            <option value="updated">最近更新</option>
            <option value="title">名称排序</option>
            <option value="source">来源排序</option>
          </select>
        </section>

        <section class="asset-grid" id="assetGrid" aria-live="polite"></section>
      </div>
    </main>
  </div>

  <div class="detail-overlay" id="detailOverlay"></div>
  <aside class="detail-panel" id="detailPanel" aria-label="组件详情" aria-hidden="true"></aside>

  <div class="toast" id="toast" role="status"></div>
  <script src="./data/resources.js?v=offline-1"></script>
  <script src="./app.js?v=offline-1"></script>
</body>
</html>
